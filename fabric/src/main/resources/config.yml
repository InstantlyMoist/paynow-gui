debug: false # Turn to 'true' when asked for debugging information
store_identifier: 411486491630370816
server_identifier: 0 # Optional, only for multi-server setups

cancel_url: "https://kyllian.nl/discord"
return_url: "https://kyllian.nl/discord" # After successful purchase, the user will be redirected here

tags_gui:
  title: "my.store.net"
  size: 18
  tag_item:
    name: "&e&l%tag%"
    material: CHEST
    slots: [0, 1, 2, 3, 4, 5, 6, 7, 8]
    hide:
      - "1234"
    overrides:
      "1234": # Tag ID
        material: DIAMOND_CHESTPLATE
        name: "&c%tag%"
        lore: |-
          &cSpecial!
        custom_model_data: 1234567
  checkout_item:
    slot: 13
    line_template: "&8- &7%item% &8&l(&2$%price%&8&l) &fx%amount%"
    loading:
      material: BARRIER
      name: "&f&lCheckout"
      lore: |-
        &7Loading your cart...
    empty:
      material: MINECART
      name: "&f&lCheckout"
      lore: |-
        &cYour cart is empty!
    filled:
      material: CHEST_MINECART
      name: "&f&lCheckout"
      lore: |-
        %items%
        &7Cart total: &a&l$%cartprice%
        &eClick to check out on our website
  clear_cart_item:
    slots: "12,14"
    material: BARRIER
    name: "&c&lClear Cart"
    lore: |-
      &r
      &7Clicking this will &c&lclear &7your cart!

products_gui:
  title: "%tag%"
  size: 0
  item:
    material_max_quantity: BARRIER
    lore: |-
      &7Price &2&l$%price%
      &7In cart: &e&l%amount%
      &r
      &7Click to &a&ladd &7to your cart (+1)
      &7Shift-Click to &c&lremove all &7from your cart
      &r
      &8&o(Prices may vary when tax is applied)
  back_item:
    material: FEATHER
    name: "&c&lBack"
    lore: ""

select_server_gui:
  title: "Select server"
  type: HOPPER
  items:
    store_id:
      slot: 0
      material: DIAMOND_SWORD
      name: "&cLorem Ipsum"
      lore: |-
        &7Click to select the Lorem Ipsum server

messages:
  error: "&cAn error occurred while trying to process your request. Please try again later."
  checkout_link: "&7[here]"
  checkout_website: |-
    &f&m                                    &7
    &r
    &aTo purchase your cart, click %link%&a!
    &r
    &f&m                                    &7
  wait: "&cPlease wait while we load the data..."
  checkout_hover: ""
